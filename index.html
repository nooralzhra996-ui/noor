<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نور الزهراء للعطور</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  font-family:"Tajawal",sans-serif;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  position:relative; overflow-x:hidden;
  /* solid tone matching the image edges so the faded image melts into it */
  background:#e8d8ca;
  padding:40px 20px;
}
.container {
  position:relative; z-index:2;
  width:100%; max-width:420px;
  display:flex; flex-direction:column; align-items:center;
}
.logo-wrap {
  width:100%; max-width:360px;
  margin-bottom:0;
  animation:fadeScale 0.9s cubic-bezier(0.34,1.4,0.64,1) forwards;
  opacity:0;
}
.logo-wrap img {
  width:100%; height:auto; display:block;
  /* fade all four edges to transparent so the image dissolves into the bg */
  -webkit-mask-image:
     radial-gradient(ellipse 72% 72% at 50% 50%, #000 55%, transparent 82%);
  mask-image:
     radial-gradient(ellipse 72% 72% at 50% 50%, #000 55%, transparent 82%);
}
@keyframes fadeScale {
  from{opacity:0;transform:scale(0.92) translateY(8px);}
  to{opacity:1;transform:scale(1) translateY(0);}
}
.divider {
  display:flex; align-items:center; gap:10px;
  margin:2px 0 26px; width:75%;
  animation:fadeUp 0.6s 0.35s ease forwards; opacity:0;
}
.divider-line { flex:1; height:1px; background:linear-gradient(to right,transparent,rgba(139,30,45,0.4),transparent); }
.divider-gem { width:6px; height:6px; background:#8b1e2d; transform:rotate(45deg); flex-shrink:0; animation:gemPulse 2.5s ease-in-out infinite; }
@keyframes gemPulse {
  0%,100%{box-shadow:0 0 0 rgba(139,30,45,0);}
  50%{box-shadow:0 0 10px rgba(139,30,45,0.5);}
}
.links { width:100%; display:flex; flex-direction:column; gap:12px; }
.link-btn {
  display:flex; align-items:center; gap:14px;
  padding:15px 20px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(139,30,45,0.15);
  border-radius:16px;
  text-decoration:none; color:#3a1a1f;
  transition:all 0.3s ease;
  animation:fadeUp 0.6s ease forwards; opacity:0;
  box-shadow:0 4px 16px rgba(139,30,45,0.06);
}
.link-btn:hover {
  border-color:rgba(139,30,45,0.4);
  background:rgba(255,255,255,0.88);
  transform:translateY(-3px);
  box-shadow:0 10px 28px rgba(139,30,45,0.14);
}
.link-btn:nth-child(1){animation-delay:0.5s}
.link-btn:nth-child(2){animation-delay:0.62s}
.link-btn:nth-child(3){animation-delay:0.74s}
.link-btn:nth-child(4){animation-delay:0.86s}
.link-icon {
  width:44px; height:44px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  min-width:44px; flex-shrink:0;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.link-btn:hover .link-icon { transform:scale(1.1) rotate(-4deg); }
.link-icon svg { width:23px; height:23px; }
.icon-tiktok { background:#000; }
.icon-insta  { background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
.icon-fb     { background:#1877F2; }
.icon-map    { background:#c0392b; }
.link-text { flex:1; }
.link-title { font-size:15px; font-weight:600; color:#2a1015; display:block; }
.link-sub   { font-size:11px; color:#9a6b72; font-weight:300; margin-top:2px; display:block; }
.link-arrow { color:#8b1e2d; font-size:16px; opacity:0.4; transition:opacity 0.3s,transform 0.3s; }
.link-btn:hover .link-arrow { opacity:1; transform:translateX(-4px); }
.footer {
  margin-top:30px; text-align:center;
  animation:fadeUp 0.6s 1s ease forwards; opacity:0;
  font-size:10px; letter-spacing:4px;
  color:rgba(139,30,45,0.35); text-transform:uppercase;
}
@keyframes fadeUp {
  from{opacity:0;transform:translateY(16px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>
